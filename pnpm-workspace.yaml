blockExoticSubdeps: false
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@5.7.2
  - volar-service-pug@0.0.71

packages:
  - extensions/*
  - packages/*
  - test-workspace

catalog:
  typescript: npm:@typescript/typescript6@^6.0.2
  typescript7: npm:typescript@^7.0.2

allowBuilds:
  "@vscode/vsce-sign": true
  dprint: true
  # Not in the workspace tree; CI gets keytar transitively via
  # `pnpm dlx @vscode/vsce publish` (vsce depends on keytar ^7.7.0).
  keytar: true

# This repo dogfoods typescript-native-bridge releases on publish day;
# pnpm 11's default 24h minimumReleaseAge gate would reject them.
minimumReleaseAge: 0

overrides:
  typescript: npm:typescript-native-bridge@6.0.3-bridge.2.tsgo.7.0.2
  # Single protocol/types copy: vscode-languageserver@9.0.1 pins 3.17.5 while
  # @volar/* float to 3.18.x — two copies make ConfigurationRequest.type and
  # connection.onRequest mutually unassignable (tsc -b errors in
  # packages/language-server/tests/server.ts).
  vscode-languageserver-protocol: 3.17.5
  vscode-languageserver-types: 3.17.5
