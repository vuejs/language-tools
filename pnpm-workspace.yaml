blockExoticSubdeps: false
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - volar-service-pug@0.0.71

packages:
  - extensions/*
  - packages/*
  - test-workspace

allowBuilds:
  '@vscode/vsce-sign': true
  dprint: true
  keytar: true
  koffi: true

overrides:
  typescript: link:./typescript-native-bridge
