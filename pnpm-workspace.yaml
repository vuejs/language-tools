blockExoticSubdeps: false
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@5.7.2
  - volar-service-pug@0.0.71

packages:
  - extensions/*
  - packages/*
  - test-workspace

catalog:
  typescript: npm:@typescript/typescript6@^6.0.2
  typescript7: npm:typescript@^7.0.2

allowBuilds:
  '@vscode/vsce-sign': true
  dprint: true
  keytar: true
