name: Sync Grammar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  sync-grammar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Pull generated grammars from Monogram
        run: |
          base="https://raw.githubusercontent.com/johnsoncodehk/monogram/master"
          for f in vue.tmLanguage.json vue.directives.tmLanguage.json vue.interpolations.tmLanguage.json; do
            curl -fsSL "$base/$f" -o "extensions/vscode/syntaxes/$f"
          done

      - run: npm run format

      - name: Regenerate grammar snapshots
        run: npm run test:grammar -- -u

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "ci(vscode): sync vue grammars from monogram"
          add: |
            extensions/vscode/syntaxes
            extensions/vscode/tests/__snapshots__/grammar.spec.ts.snap
          default_author: github_actions
