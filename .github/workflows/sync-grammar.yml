name: Sync Grammar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  sync-grammar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Bump Monogram submodule to latest master
        run: git submodule update --remote extensions/vscode/monogram

      - name: Generate grammars from Monogram
        run: npm run gen:grammar

      - name: Regenerate grammar snapshots
        run: npm run test:grammar -- -u

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "ci(vscode): sync vue grammars from monogram"
          add: |
            extensions/vscode/monogram
            extensions/vscode/syntaxes
            extensions/vscode/tests/__snapshots__/grammar.spec.ts.snap
          default_author: github_actions
